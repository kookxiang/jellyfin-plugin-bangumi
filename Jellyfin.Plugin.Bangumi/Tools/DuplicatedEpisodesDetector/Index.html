<div class="page type-interior pluginConfigurationPage" data-require="emby-input,emby-button,emby-select,emby-checkbox" data-role="page" id="duplicatedEpisodeDetectPage">
    <style>
        #detect-result {
            margin-top: 3em;
        }

        .detect-result-empty {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2em;
            margin-top: 4em;
        }

        .detect-result-empty .material-icons {
            display: flex;
            width: 96px;
            height: 96px;
            font-size: 64px;
            border-radius: 48px;
            align-items: center;
            justify-content: center;
            background-color: var(--jf-palette-success-main);
        }

        .detect-result-list {
            display: flex;
            flex-direction: column;
            gap: 2rem;
        }

        .detect-result-title {
            display: flex;
            flex-direction: row;
            align-items: center;
            gap: 0.5rem;
        }

        .detect-result-title h3 {
            flex: 1;
            overflow: hidden;
            white-space: nowrap;
            text-overflow: ellipsis;
        }

        .detect-result-title a {
            color: var(--jf-palette-text-primary);
            opacity: 0.5;
            transition: opacity 0.25s ease-in-out;
            text-decoration: none;
        }

        .detect-result-title a:hover {
            opacity: 1;
        }

        .detect-result-files {
            display: flex;
            flex-direction: column;
            gap: 0.25rem;
        }

        .detect-result-files > label {
            display: flex;
            flex-direction: row;
            padding: 1rem 1.25rem;
            gap: 1rem;
            border-radius: 0.25rem;
            overflow: hidden;
            background-color: var(--jf-palette-background-paper);
            box-shadow: var(--jf-shadows-3);
            transition: all 0.25s ease-in-out;
        }

        .detect-result-files > label:hover {
            box-shadow: var(--jf-shadows-8);
        }

        .detect-result-files .checkboxOutline {
            position: static;
            flex-shrink: 0;
        }

        .detect-result-files > label:focus + .checkboxOutline {
            border-color: var(--jf-palette-primary-main);
        }

        .detect-result-files > label > input:checked + .checkboxOutline {
            border-color: var(--jf-palette-primary-main);
            background-color: var(--jf-palette-primary-main);
        }

        .detect-result-files > label:focus > input:checked + .checkboxOutline {
            border-color: var(--jf-palette-action-active);
        }

        .detect-result-files input:not(:checked) + .checkboxOutline > .check {
            display: none;
        }

        .detect-result-files a {
            color: var(--jf-palette-text-primary);
            opacity: 0.5;
            transition: opacity 0.25s ease-in-out;
            text-decoration: none;
        }

        .detect-result-files a:hover {
            opacity: 1;
        }

        .item-file-path {
            flex: 1;
        }

        .item-file-info {
            margin-top: 0.5rem;
            font-size: 0.8rem;
            display: flex;
            gap: 2rem;
            align-items: center;
            opacity: 0.5;
            color: var(--jf-palette-text-secondary);
        }

        .item-file-info > span {
            display: flex;
            align-items: center;
            gap: 0.25rem;
        }

        .item-file-info .material-icons {
            font-size: 1rem;
        }

        .remove-button-container {
            margin-top: 3rem;
        }
    </style>
    <div data-role="content">
        <div class="content-primary">
            <form id="detect-form">
                <div class="verticalSection">
                    <div class="sectionTitleContainer flex align-items-center">
                        <h2 class="sectionTitle">重复剧集检测</h2>
                    </div>
                </div>
                <div class="checkboxContainer checkboxContainer-withDescription">
                    <label class="emby-checkbox-label">
                        <input id="skip-specials" is="emby-checkbox" type="checkbox" checked/>
                        <span>仅检测正片</span>
                    </label>
                    <div class="fieldDescription">OVA、OAD、特典等误判概率较高，启用后跳过这些内容</div>
                </div>
                <div class="checkboxContainer checkboxContainer-withDescription">
                    <label class="emby-checkbox-label">
                        <input id="check-length" is="emby-checkbox" type="checkbox" checked/>
                        <span>检查时长</span>
                    </label>
                    <div class="fieldDescription">如果时长差距超过 1%，且相差超过 30 秒，则认为是不同的章节</div>
                </div>
                <div class="submit-button-container">
                    <button id="start-scan-button" class="raised button-submit block emby-button" is="emby-button" type="submit">
                        <span>开始检测</span>
                    </button>
                </div>
            </form>
            <form id="detect-result" style="display: none">
                <div class="verticalSection">
                    <div class="sectionTitleContainer flex align-items-center">
                        <h2 class="sectionTitle">检测结果</h2>
                    </div>
                </div>
                <template id="episode-template">
                    <div class="detect-result-item">
                        <div class="detect-result-title">
                            <i class="material-icons live_tv"></i>
                            <h3></h3>
                            <a target="_blank" class="material-icons open_in_new"></a>
                        </div>
                        <div class="detect-result-files"></div>
                    </div>
                </template>
                <template id="item-template">
                    <label>
                        <input class="emby-checkbox" type="checkbox"/>
                        <span class="checkboxOutline">
                            <span class="material-icons check" aria-hidden="true"></span>
                        </span>
                        <div class="item-container">
                            <div class="item-file-path"></div>
                            <div class="item-file-info">
                                <span>
                                    <i class="material-icons today"></i>
                                    <time class="file-modified-time">January 10, 2026 at 6:30:53 PM</time>
                                </span>
                                <span>
                                    <i class="material-icons timer"></i>
                                    <span class="duration">12 min, 34 sec</span>
                                </span>
                            </div>
                        </div>
                        <a target="_blank" class="material-icons info"></a>
                    </label>
                </template>
                <div class="detect-result-list"></div>
                <div class="remove-button-container">
                    <button id="remove-button" class="raised button-submit block emby-button" is="emby-button" type="submit">
                        <span>删除所选文件</span>
                    </button>
                </div>
                <div class="detect-result-empty">
                    <i class="material-icons check"></i>
                    <div class="message">没有检测到重复剧集</div>
                </div>
            </form>
        </div>
    </div>
    <script>
        (function () {
            const container = document.querySelector('#duplicatedEpisodeDetectPage:not(.hide)');
            const submitButton = container.querySelector('#start-scan-button');
            const deleteButton = container.querySelector('#remove-button');

            async function runScan() {
                try {
                    Dashboard.showLoadingMsg();
                    submitButton.setAttribute('disabled', 'disabled');

                    container.querySelector('#detect-result').style.display = 'none';

                    const request = await ApiClient.fetch({
                        type: 'POST',
                        url: '/Plugins/Bangumi/Tools/DuplicatedEpisodesDetector/Scan',
                        data: {
                            length: container.querySelector('#check-length').checked,
                            specials: !container.querySelector('#skip-specials').checked,
                        },
                    });
                    const result = await request.json();

                    Array.from(container.querySelector('.detect-result-list').children).forEach((item) => item.remove());

                    if (result.length) {
                        container.querySelector('.detect-result-empty').style.display = 'none';
                        container.querySelector('.detect-result-list').style.display = '';
                        container.querySelector('.remove-button-container').style.display = '';

                        for (const item of result) {
                            const episodeElement = container.querySelector('#episode-template').content.cloneNode(true);
                            episodeElement.querySelector('h3').textContent = item.Title;
                            episodeElement.querySelector('a').href = 'https://bgm.tv/ep/' + item.BangumiId;

                            const itemsContainer = episodeElement.querySelector('.detect-result-files');
                            const latestModifiedTime = item.Items
                                .map(x => x.LastModified)
                                .reduce((previous, latest) => previous.localeCompare(latest) > 0 ? previous : latest);

                            for (const file of item.Items) {
                                const itemElement = container.querySelector('#item-template').content.cloneNode(true);
                                itemElement.querySelector('input').value = file.Id;
                                itemElement.querySelector('input').checked = file.LastModified !== latestModifiedTime;
                                itemElement.querySelector('.item-file-path').textContent = file.Path;
                                itemElement.querySelector('.file-modified-time').textContent = formatDateTime(file.LastModified);
                                itemElement.querySelector('.duration').textContent = formatDuration(file.Ticks);
                                itemElement.querySelector('a').href = '#/details?id=' + file.Id;
                                itemsContainer.appendChild(itemElement);
                            }

                            container.querySelector('.detect-result-list').appendChild(episodeElement);
                        }
                    } else {
                        container.querySelector('.detect-result-empty').style.display = '';
                        container.querySelector('.detect-result-list').style.display = 'none';
                        container.querySelector('.remove-button-container').style.display = 'none';
                    }

                    container.querySelector('#detect-result').style.display = '';
                } finally {
                    Dashboard.hideLoadingMsg();
                    submitButton.removeAttribute('disabled');
                }
            }

            submitButton.addEventListener('click', async function (e) {
                e.preventDefault();
                await runScan();
            });

            deleteButton.addEventListener('click', async function (e) {
                e.preventDefault();
                try {
                    const items = Array.from(container.querySelectorAll('.detect-result-files input[type="checkbox"]:checked')).map(x => x.value);

                    if (items.length === 0) {
                        Dashboard.alert('请先选择需要删除的文件');
                        return;
                    }

                    if (!await new Promise(resolve => Dashboard.confirm(`确定要删除已选择的 ${items.length} 个文件吗？此操作无法撤销，请仔细检查`, '删除重复剧集', resolve))) {
                        return;
                    }

                    Dashboard.showLoadingMsg();
                    deleteButton.setAttribute('disabled', 'disabled');

                    const request = await ApiClient.fetch({
                        type: 'POST',
                        url: '/Plugins/Bangumi/Tools/DuplicatedEpisodesDetector/Delete',
                        data: { items },
                    });

                    if (!request.ok) {
                        throw new Error(await request.text());
                    }

                    Dashboard.alert('所选文件已删除');
                    await runScan();
                } finally {
                    Dashboard.hideLoadingMsg();
                    deleteButton.removeAttribute('disabled');
                }
            });

            const dateTimeFormatter = new Intl.DateTimeFormat(undefined, {
                dateStyle: 'long',
                timeStyle: 'medium'
            });
            const durationFormatter = new Intl.DurationFormat();

            function formatDateTime(dateTimeStr) {
                const date = new Date(dateTimeStr);
                return dateTimeFormatter.format(date);
            }

            function formatDuration(ticks) {
                const seconds = Math.floor(ticks / 10000000) % 60;
                const minutes = Math.floor(ticks / 10000000 / 60) % 60;
                const hours = Math.floor(ticks / 10000000 / 60 / 60) % 24;

                return durationFormatter.format({
                    hours,
                    minutes,
                    seconds
                });
            }
        })();
    </script>
</div>
