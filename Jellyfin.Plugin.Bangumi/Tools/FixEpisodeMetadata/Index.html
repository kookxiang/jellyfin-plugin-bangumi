<div class="page type-interior pluginConfigurationPage" data-require="emby-input,emby-button,emby-select,emby-checkbox"
    data-role="page" id="fixEpisodeMetadataPage">
    <div data-role="content">
        <div class="content-primary">
            <form id="fix-form">
                <div class="verticalSection">
                    <div class="sectionTitleContainer flex align-items-center">
                        <h2 class="sectionTitle">修正错误的剧集元数据</h2>
                    </div>
                </div>
                <div class="fieldDescription">通常不需要很长时间，执行时请不要关闭页面</div>
                <div class="verticalSection">
                    <div class="sectionTitleContainer flex align-items-center">
                        <h3 class="sectionTitle">当前功能：移除剧集中为 0 的 Bangumi ID</h3>
                    </div>
                    <div class="fieldDescription">如果你曾使用过本插件 1.7.6 及之前版本，并且存在剧集的 Bangumi ID 为 0（特别是特典）的情况，可以使用此功能移除无效 ID</div>
                </div>

                <div class="submit-button-container">
                    <button id="start-fix-button" class="raised button-submit block emby-button" is="emby-button"
                        type="submit">
                        <span>开始修正</span>
                    </button>
                </div>
            </form>

            <div id="fix-result" style="display: none">
                <h3>修复结果</h3>
                <div id="result-summary"></div>
            </div>
        </div>
    </div>
    <script>
        (function () {
            const page = document.querySelector('#fixEpisodeMetadataPage:not(.hide)');
            const startButton = page.querySelector('#start-fix-button');
            const resultDiv = page.querySelector('#fix-result');
            const resultSummary = page.querySelector('#result-summary');

            startButton.addEventListener('click', async function (e) {
                e.preventDefault();
                try {
                    Dashboard.showLoadingMsg();
                    startButton.disabled = true;
                    resultDiv.style.display = 'none';

                    const response = await ApiClient.fetch({
                        type: 'POST',
                        url: '/Plugins/Bangumi/Tools/FixEpisodeMetadata/Run'
                    });

                    if (!response.ok) {
                        throw new Error(await response.text());
                    }

                    const result = await response.json();

                    resultSummary.innerHTML =
                        '<p>处理完成：</p>' +
                        '<ul>' +
                        '<li>总剧集数：' + result.TotalCount + '</li>' +
                        '<li>移除 ID 为 0 的剧集数：' + result.RemovedCount + '</li>' +
                        '<li>有效 ID 剧集数：' + result.ValidCount + '</li> ' +
                        '<li>无 ID 剧集数：' + result.NoIdCount + '</li> ' +
                        '</ul> '
                        ;
                    resultDiv.style.display = 'block';
                } catch (error) {
                    Dashboard.alert('修复失败：' + error.message);
                } finally {
                    Dashboard.hideLoadingMsg();
                    startButton.disabled = false;
                }
            });
        })();</script>
</div>
